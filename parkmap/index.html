<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkMap Sverige - Lulea</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e14;--panel:#14161e;--border:#252838;
  --text:#e4e6ee;--text2:#9196ab;--muted:#565b72;
  --accent:#4a9eff;--green:#34d399;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:1000;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#4a9eff,#6366f1);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:16px;color:#fff}
.logo-text{font-weight:700;font-size:15px;letter-spacing:.5px}
.logo-text span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.pilot-badge{background:#6366f1;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}

.search-box{flex:1;max-width:280px;position:relative}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--muted)}

.osm-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;flex-shrink:0;white-space:nowrap;user-select:none}
.osm-toggle input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.osm-toggle span{line-height:1}

.stats{display:flex;gap:14px;margin-left:auto;flex-shrink:0}
.stat{text-align:center}
.stat-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

.back-link{font-size:12px;color:var(--text2);flex-shrink:0;white-space:nowrap}

/* Map */
#map{position:fixed;top:56px;left:0;right:0;bottom:0}
.leaflet-control-zoom{border:1px solid var(--border) !important}
.leaflet-control-zoom a{background:var(--panel) !important;color:var(--text) !important;border-color:var(--border) !important}
.leaflet-control-zoom a:hover{background:var(--bg) !important}
.leaflet-control-attribution{background:rgba(12,14,20,.8) !important;color:var(--muted) !important;font-size:10px !important}
.leaflet-control-attribution a{color:var(--text2) !important}
.leaflet-control-layers{background:var(--panel) !important;border:1px solid var(--border) !important;border-radius:8px !important;color:var(--text) !important}
.leaflet-control-layers-toggle{width:32px !important;height:32px !important}
.leaflet-control-layers label{color:var(--text) !important}

/* Legend */
.legend{position:fixed;bottom:24px;left:16px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;z-index:1000;min-width:200px;max-width:240px;max-height:calc(100vh - 100px);overflow-y:auto}
.legend-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.legend-item{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:13px;transition:opacity .2s}
.legend-item.dimmed{opacity:.3}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;color:var(--text)}
.legend-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.legend-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.legend-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.quality-stat{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--text2)}
.quality-stat span:last-child{font-family:'Space Mono',monospace;color:var(--text)}

/* Coverage bar */
.coverage-bar{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* Filter pills */
.filter-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.filter-pill{font-size:11px;padding:3px 8px;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text2);white-space:nowrap}
.filter-pill:hover{border-color:var(--accent)}

/* Unknown section */
.unknown-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.unknown-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.unknown-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.unknown-count{font-family:'Space Mono',monospace;font-size:11px;color:#f97316}
.visa-okanda-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #f97316;cursor:pointer;transition:all .15s;background:transparent;color:#f97316;font-family:inherit;white-space:nowrap}
.visa-okanda-btn.active{background:#f97316;color:#fff}
.visa-okanda-btn:hover{background:#f9731630}

/* Detail panel */
.detail-panel{position:fixed;bottom:0;right:16px;width:360px;max-height:calc(100vh - 80px);background:var(--panel);border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;z-index:1000;transform:translateY(100%);opacity:0;transition:transform .3s ease,opacity .3s ease;overflow-y:auto}
.detail-panel.open{transform:translateY(0);opacity:1}
.detail-header{padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);display:flex;justify-content:space-between;align-items:flex-start}
.detail-title{font-size:16px;font-weight:700}
.detail-operator{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-top:4px}
.detail-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1}
.detail-close:hover{color:var(--text)}
.detail-body{padding:16px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--muted)}
.detail-value{color:var(--text);text-align:right;max-width:60%}
.detail-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.detail-tag{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--text2)}
.detail-flags{margin-top:8px;padding:8px 0}
.detail-flag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin:2px}
.confidence-bar{width:60px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.confidence-fill{height:100%;border-radius:3px;transition:width .3s}
.zone-flags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.flag-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.unknown-notice{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;color:var(--text2);line-height:1.5}
.unknown-notice a{color:var(--accent)}
.unknown-notice-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:6px;font-weight:600}

/* Loading / Error */
.overlay{position:fixed;top:56px;left:0;right:0;bottom:0;background:rgba(12,14,20,.9);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:12px}
.overlay-text{font-size:15px;color:var(--text2)}
.overlay-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.retry-btn{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;margin-top:8px}
.retry-btn:hover{opacity:.9}

/* Mobile */
@media(max-width:768px){
  .stats{display:none}
  .search-box{max-width:160px}
  .osm-toggle span{display:none}
  .legend{bottom:12px;left:8px;right:8px;max-width:none}
  .detail-panel{left:0;right:0;width:auto;max-height:50vh}
  .back-link{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">P</div>
    <div class="logo-text">ParkMap <span>SVERIGE</span></div>
  </div>
  <div class="pilot-badge">LULEA PILOT</div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Sok zon, gata, operator...">
  </div>
  <label class="osm-toggle">
    <input type="checkbox" id="showUnknown" />
    <span>Visa alla parkeringar</span>
  </label>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="stat-zones">-</div><div class="stat-label">Kartlagda</div></div>
    <div class="stat"><div class="stat-val" id="stat-total">-</div><div class="stat-label">Totalt</div></div>
    <div class="stat"><div class="stat-val" id="stat-spots">-</div><div class="stat-label">Platser</div></div>
  </div>
  <a href="/" class="back-link">&larr; maxineplatform.com</a>
</div>

<div id="map"></div>

<div class="legend" id="legend"></div>

<div class="detail-panel" id="detail">
  <div class="detail-header">
    <div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-operator" id="detail-operator"></div>
    </div>
    <button class="detail-close" id="detail-close">&times;</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div class="overlay" id="loading">
  <div class="overlay-spinner"></div>
  <div class="overlay-text">Laddar parkeringsdata...</div>
</div>

<div class="overlay" id="error" style="display:none">
  <div class="overlay-text" id="error-msg">Kunde inte ladda data</div>
  <button class="retry-btn" onclick="loadData()">Forsok igen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map', {zoomControl: true}).setView([65.583, 22.148], 13);

const baseLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
});
const baseDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
});
baseLight.addTo(map);
L.control.layers({"Ljus": baseLight, "Mork": baseDark}, null, {position: 'topright'}).addTo(map);

let geoData = null;
let opsData = null;
let geoLayer = null;
let activeFilters = new Set();
let searchTerm = '';
let showUnknown = false;
let unknownMode = false;  // true = show ONLY unknowns, dim all others

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display = 'none';
  try {
    const [geoRes, opsRes] = await Promise.all([
      fetch('../data/regions/norrbotten/lulea.geojson'),
      fetch('../data/operators/lulea-operators.json')
    ]);
    if (!geoRes.ok || !opsRes.ok) throw new Error('HTTP ' + geoRes.status);
    geoData = await geoRes.json();
    opsData = await opsRes.json();
    render();
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').textContent = 'Kunde inte ladda data: ' + e.message;
    document.getElementById('error').style.display = 'flex';
  }
}

function render() {
  if (geoLayer) map.removeLayer(geoLayer);

  // When unknownMode is active, ONLY show unknowns (skip activeFilters logic for known)
  const features = geoData.features.filter(f => {
    const p = f.properties;
    const isUnknown = p.operator === 'unknown';

    if (unknownMode) {
      // In unknownMode, only show unknown zones
      return isUnknown;
    }

    // Hide unknown operators unless toggle is on
    if (isUnknown && !showUnknown) return false;
    if (activeFilters.size > 0 && !activeFilters.has(p.operator)) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      const haystack = [p.name, p.operator, p.zone_code, p.restrictions].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(s)) return false;
    }
    return true;
  });

  geoLayer = L.geoJSON({type: 'FeatureCollection', features}, {
    style: styleForZone,
    pointToLayer: (f, latlng) => {
      const op = f.properties.operator;
      const isUnknown = op === 'unknown';
      const color = isUnknown ? '#f97316' : (opsData[op]?.color || '#6b7280');
      const conf = f.properties.confidence || 0.5;
      return L.circleMarker(latlng, {
        radius: isUnknown ? 6 : 7,
        color: color,
        fillColor: color,
        fillOpacity: isUnknown ? 0.35 : (conf > 0.7 ? 0.65 : 0.35),
        weight: isUnknown ? 2 : 2.5,
        dashArray: isUnknown ? '6, 4' : (conf < 0.7 ? '5, 8' : null)
      });
    },
    onEachFeature: (f, layer) => {
      layer.on('click', () => showDetail(f.properties));
      layer.on('mouseover', () => layer.setStyle({fillOpacity: 0.75, weight: 3.5, opacity: 1}));
      layer.on('mouseout', () => geoLayer.resetStyle(layer));
    }
  }).addTo(map);

  updateStats(features);
  renderLegend();
}

function styleForZone(feature) {
  const props = feature.properties;
  const opKey = props.operator;
  const isUnknown = opKey === 'unknown';
  const color = isUnknown ? '#f97316' : (opsData[opKey]?.color || '#6b7280');
  const conf = props.confidence || 0.5;
  const flags = props.flags || [];

  if (isUnknown) {
    if (unknownMode) {
      // Prominent orange in unknownMode
      return {
        fillColor: '#f97316',
        fillOpacity: 0.55,
        color: '#f97316',
        weight: 3,
        opacity: 1,
        dashArray: '6,4',
      };
    }
    // showUnknown but not unknownMode — visually prominent but not dominant
    return {
      fillColor: '#f97316',
      fillOpacity: 0.40,
      color: '#f97316',
      weight: 2,
      opacity: 0.85,
      dashArray: '6,4',
    };
  }

  // Known operator zone
  const style = {
    fillColor: color,
    fillOpacity: conf < 0.7 ? 0.12 : 0.50,
    color: color,
    weight: 2.5,
    opacity: 0.85,
    dashArray: conf < 0.7 ? '5, 8' : null,
  };

  if (flags.includes('needs_review')) {
    style.dashArray = '3, 6';
    style.weight = 1.5;
  }

  return style;
}

function updateStats(features) {
  const known = geoData.features.filter(f => f.properties.operator !== 'unknown');
  const total = geoData.features.length;

  document.getElementById('stat-zones').textContent = known.length;
  document.getElementById('stat-total').textContent = total;
  const spots = features.reduce((a, f) => a + (f.properties.spots || 0), 0);
  document.getElementById('stat-spots').textContent = spots || '-';
}

function renderLegend() {
  const counts = {};
  let highConf = 0;
  let reviewCount = 0;

  geoData.features.forEach(f => {
    const op = f.properties.operator;
    counts[op] = (counts[op] || 0) + 1;
    if ((f.properties.confidence || 0) > 0.7) highConf++;
    if (f.properties.flags && f.properties.flags.includes('needs_review')) reviewCount++;
  });

  const knownTotal = geoData.features.filter(f => f.properties.operator !== 'unknown').length;
  const total = geoData.features.length;
  const unknownCount = counts['unknown'] || 0;
  const coveragePct = total > 0 ? (knownTotal / total * 100).toFixed(1) : '0.0';

  const legend = document.getElementById('legend');

  // Build the major operators list for pills (only those with count > 0, skip unknown)
  const opKeys = Object.entries(opsData)
    .filter(([key]) => key !== 'unknown' && (counts[key] || 0) > 0)
    .map(([key, info]) => ({ key, info, count: counts[key] }));

  // --- Build HTML ---
  let html = '';

  // Coverage bar
  html += `
    <div class="coverage-bar">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:var(--muted)">TACKNING</span>
        <span style="font-family:'Space Mono',monospace;color:var(--green)">${coveragePct}%</span>
      </div>
      <div style="height:4px;background:var(--border);border-radius:2px">
        <div style="height:100%;width:${coveragePct}%;background:var(--green);border-radius:2px"></div>
      </div>
    </div>
  `;

  html += '<div class="legend-title">Operatorer</div>';

  // Filter pills
  html += '<div class="filter-pills" id="filter-pills">';
  // "Alla" pill
  const allaActive = activeFilters.size === 0 && !unknownMode;
  html += `<span class="filter-pill${allaActive ? ' active' : ''}" data-pill="alla" style="${allaActive ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : ''}">Alla</span>`;
  // "Okanda" pill
  const okandaActive = unknownMode;
  html += `<span class="filter-pill${okandaActive ? ' active' : ''}" data-pill="okanda" style="${okandaActive ? 'background:#f97316;color:#fff;border-color:#f97316' : 'color:#f97316;border-color:#f97316'}">Okanda</span>`;
  // Per-operator pills
  opKeys.forEach(({ key, info, count }) => {
    const isActive = activeFilters.has(key);
    html += `<span class="filter-pill${isActive ? ' active' : ''}" data-pill="${key}" style="${isActive ? `background:${info.color};color:#fff;border-color:${info.color}` : ''}">${info.name}</span>`;
  });
  html += '</div>';

  // Operator list items (known only)
  legend.innerHTML = html;

  // Add known operator list items as DOM nodes (so we can attach events)
  const legendEl = document.getElementById('legend');

  opKeys.forEach(({ key, info, count }) => {
    const dimmed = activeFilters.size > 0 && !activeFilters.has(key);
    const item = document.createElement('div');
    item.className = 'legend-item' + (dimmed ? ' dimmed' : '');
    item.innerHTML = `<div class="legend-dot" style="background:${info.color}"></div><div class="legend-name">${info.name}</div><div class="legend-count">${count}</div>`;
    item.onclick = () => {
      unknownMode = false;
      if (activeFilters.has(key)) activeFilters.delete(key);
      else activeFilters.add(key);
      render();
    };
    legendEl.appendChild(item);
  });

  // Unknown zones section
  if (unknownCount > 0) {
    const unknownSec = document.createElement('div');
    unknownSec.className = 'unknown-section';
    unknownSec.innerHTML = `
      <div class="unknown-section-header">
        <div>
          <span class="unknown-section-title">OKANDA ZONER</span>
          <span class="unknown-count" style="margin-left:6px">[${unknownCount}]</span>
        </div>
      </div>
    `;
    const visaBtn = document.createElement('button');
    visaBtn.className = 'visa-okanda-btn' + (unknownMode ? ' active' : '');
    visaBtn.textContent = unknownMode ? 'Dold okanda' : 'Visa okanda';
    visaBtn.onclick = () => {
      unknownMode = !unknownMode;
      if (unknownMode) {
        showUnknown = true;
        activeFilters.clear();
        document.getElementById('showUnknown').checked = true;
      }
      render();
    };
    unknownSec.appendChild(visaBtn);
    legendEl.appendChild(unknownSec);
  }

  // Clear filter option (only shown when known operator filters are active)
  if (activeFilters.size > 0) {
    const clear = document.createElement('div');
    clear.className = 'legend-item';
    clear.style.marginTop = '6px';
    clear.innerHTML = '<div class="legend-dot" style="background:var(--muted)"></div><div class="legend-name" style="color:var(--accent)">Visa alla</div>';
    clear.onclick = () => { activeFilters.clear(); unknownMode = false; render(); };
    legendEl.appendChild(clear);
  }

  // Data quality section
  const qualSection = document.createElement('div');
  qualSection.className = 'legend-section';
  qualSection.innerHTML = `
    <div class="legend-section-title">DATAKVALITET</div>
    <div class="quality-stat">
      <span>Hog konfidens (&gt;70%)</span>
      <span>${highConf}</span>
    </div>
    <div class="quality-stat">
      <span>Behover granskning</span>
      <span>${reviewCount}</span>
    </div>
    <div class="quality-stat">
      <span>OSM-polygoner</span>
      <span>${geoData.features.filter(f => f.properties.osm_id || (f.properties.flags||[]).includes('osm_imported')).length}</span>
    </div>
  `;
  legendEl.appendChild(qualSection);

  // Wire up pill clicks
  legendEl.querySelectorAll('[data-pill]').forEach(pill => {
    pill.addEventListener('click', () => {
      const key = pill.dataset.pill;
      if (key === 'alla') {
        activeFilters.clear();
        unknownMode = false;
        showUnknown = false;
        document.getElementById('showUnknown').checked = false;
      } else if (key === 'okanda') {
        unknownMode = !unknownMode;
        if (unknownMode) {
          showUnknown = true;
          activeFilters.clear();
          document.getElementById('showUnknown').checked = true;
        }
      } else {
        unknownMode = false;
        if (activeFilters.has(key)) activeFilters.delete(key);
        else activeFilters.add(key);
      }
      render();
    });
  });
}

function showDetail(p) {
  const panel = document.getElementById('detail');
  const op = opsData[p.operator];
  const opName = op?.name || p.operator;
  const opColor = (p.operator === 'unknown') ? '#f97316' : (op?.color || '#888');
  const isUnknown = p.operator === 'unknown';

  document.getElementById('detail-title').textContent = p.name || 'Zon';
  document.getElementById('detail-operator').innerHTML =
    `<div class="legend-dot" style="background:${opColor}"></div> ${opName}`;

  const rows = [];
  const add = (label, value) => { if (value != null && value !== '') rows.push(`<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value">${value}</div></div>`); };

  add('Typ', typeLabel(p.type));
  add('Platser', p.spots);
  add('Pris/timme', p.price_per_hour != null ? p.price_per_hour + ' ' + (p.currency || 'SEK') : null);
  add('Zonkod', p.zone_code);
  add('Oppettider', p.hours);
  add('Restriktioner', p.restrictions);
  add('Kontakt', p.contact);

  if (p.source_url) {
    try {
      add('Kalla', `<a href="${p.source_url}" target="_blank" rel="noopener">${new URL(p.source_url).hostname}</a>`);
    } catch(e) {
      add('Kalla', `<a href="${p.source_url}" target="_blank" rel="noopener">Lank</a>`);
    }
  }

  // OSM metadata
  if (p.osm_id) {
    const osmType = p.osm_type || 'way';
    add('OSM ID', `<a href="https://www.openstreetmap.org/${osmType}/${p.osm_id}" target="_blank" rel="noopener">${p.osm_id}</a>`);
  }
  if (p.osm_operator) {
    add('OSM operator', p.osm_operator);
  }
  if (p.osm_fee) {
    add('Avgift (OSM)', p.osm_fee);
  }
  if (p.osm_surface) {
    add('Yta', p.osm_surface);
  }

  // Coordinates for unknown zones
  if (isUnknown && p.lat != null && p.lon != null) {
    add('Koordinater', `${parseFloat(p.lat).toFixed(5)}, ${parseFloat(p.lon).toFixed(5)}`);
  }

  // Payment apps
  if (op?.payment_apps?.length) {
    const tags = op.payment_apps.map(a => `<span class="detail-tag">${a}</span>`).join('');
    add('Betalning', `<div class="detail-tags">${tags}</div>`);
  }

  // Confidence bar
  if (p.confidence != null) {
    const pct = Math.round(p.confidence * 100);
    const barColor = pct > 70 ? '#34d399' : pct > 40 ? '#fbbf24' : '#f87171';
    add('Konfidens', `${pct}% <div class="confidence-bar"><div class="confidence-fill" style="width:${pct}%;background:${barColor}"></div></div>`);
  }

  add('Verifierad', p.last_verified);

  // Flags with color coding
  let flagsHtml = '';
  const flags = p.flags || [];
  if (flags.length > 0) {
    flagsHtml = '<div class="zone-flags">';
    const flagColors = {
      'needs_review': '#fbbf24',
      'in_water_area': '#f87171',
      'price_changed': '#a855f7',
      'new_zone': '#34d399',
      'low_confidence': '#f97316',
      'outside_city_bounds': '#f87171',
      'too_small': '#f97316',
      'too_large': '#f97316',
      'missing_coordinates': '#ef4444',
      'owner_changed': '#a855f7',
      'zone_removed': '#ef4444',
      'scrape_error': '#ef4444',
      'unknown_operator': '#6b7280',
      'osm_imported': '#4a9eff',
      'osm_upgraded': '#34d399',
      'no_osm_match': '#fbbf24',
    };
    flags.forEach(flag => {
      const color = flagColors[flag] || '#6b7280';
      flagsHtml += `<span class="flag-tag" style="background:${color}20; color:${color}; border:1px solid ${color}40">${flag.replace(/_/g, ' ')}</span>`;
    });
    flagsHtml += '</div>';
  }

  // Unknown operator notice
  let noticeHtml = '';
  if (isUnknown) {
    // Special classification badges
    let badgesHtml = '';
    if (p.fee_confirmed_unknown) {
      badgesHtml += `<div class="unknown-notice-badge" style="background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.4)">Bekraftad betalparkering &mdash; operator okand</div>`;
    }
    if (p.rural_free_heuristic) {
      badgesHtml += `<div class="unknown-notice-badge" style="background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.3)">Landsbygdsparkering (klassificerad automatiskt)</div>`;
    }

    // OSM link in notice (if not already shown above as a row)
    let osmNoticeLink = '';
    if (p.osm_id) {
      const osmType = p.osm_type || 'way';
      osmNoticeLink = ` &mdash; <a href="https://www.openstreetmap.org/${osmType}/${p.osm_id}" target="_blank" rel="noopener">OSM ${p.osm_id}</a>`;
    }

    // Coords in notice (if not already shown above)
    let coordsLine = '';
    if (p.lat != null && p.lon != null) {
      coordsLine = `<br><span style="color:var(--muted);font-size:11px">${parseFloat(p.lat).toFixed(5)}, ${parseFloat(p.lon).toFixed(5)}</span>`;
    }

    noticeHtml = `<div class="unknown-notice">
      <strong>Okand operator</strong>${osmNoticeLink} &mdash; Denna parkering hittades via OpenStreetMap men vi vet inte vem som driver den.${coordsLine}
      ${badgesHtml ? '<div style="margin-top:6px">' + badgesHtml + '</div>' : ''}
      <div style="margin-top:8px">Vet du? <a href="mailto:parkmap@maxineplatform.com?subject=Operator for ${encodeURIComponent(p.name || p.id)}&body=Parkering: ${encodeURIComponent(p.name || p.id)}%0AOperator: ">Tipsa oss!</a></div>
    </div>`;
  }

  document.getElementById('detail-body').innerHTML = rows.join('') + flagsHtml + noticeHtml;
  panel.classList.add('open');
}

function typeLabel(t) {
  const labels = {garage:'Garage',outdoor:'Utomhus',underground:'Underjordisk',street:'Gatuparkering',lot:'Parkeringsplats'};
  return labels[t] || t;
}

document.getElementById('detail-close').onclick = () => {
  document.getElementById('detail').classList.remove('open');
};

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('showUnknown').addEventListener('change', e => {
  showUnknown = e.target.checked;
  if (!showUnknown) unknownMode = false;
  render();
});

map.on('click', () => document.getElementById('detail').classList.remove('open'));

loadData();
</script>
</body>
</html>
